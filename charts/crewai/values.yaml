# Default values for the CrewAI Helm chart
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: ghcr.io/locotoki/alfred-agent-platform-v2/crewai
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: "crewai-service-account"

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8080

crewai:
  endpoint: "https://crewai.prod.internal"
  auth:
    audience: "https://crewai.prod.internal"
    token: "" # This will be populated from the secret

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  - name: LOG_LEVEL
    value: "info"
  - name: CREWAI_ENDPOINT
    value: "{{ .Values.crewai.endpoint }}"
  - name: CREWAI_A2A_AUDIENCE
    value: "{{ .Values.crewai.auth.audience }}"
  - name: CREWAI_A2A_JWT
    value: "/var/run/secrets/crewai-a2a/token"

secrets:
  crewaiA2aToken:
    name: "crewai-a2a-token"
    key: "token"