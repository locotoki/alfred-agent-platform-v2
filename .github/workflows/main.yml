name: CI/CD Pipeline

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run linters
        run: make lint
  
  tests:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: make test
  
  slack-smoke:
    needs: tests
    runs-on: ubuntu-latest
    environment: staging          # ← gives access to staging secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_APP_TOKEN: ${{ secrets.SLACK_APP_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
        run: pytest tests/slack
  
  smoke-health:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run health checks
        run: ./scripts/run-e2e-health-test.sh
  
  otel-smoke:
    needs: smoke-health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test OpenTelemetry tracing
        run: ./ci/compose/otel-smoke.yml
  
  orchestration-integration:
    needs: [smoke-health, otel-smoke, slack-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install langgraph==0.2.* pytest-cov freezegun
      - name: Run LangGraph tests
        run: |
          pytest tests/remediation/test_graphs.py -v --cov=remediation.graphs --cov-report=term --cov-fail-under=95
      - name: Verify remediation graph
        run: |
          python -c "import remediation.graphs; graph, state = remediation.graphs.restart_then_verify('alertmanager-dummy-service'); print('Graph verification successful!')"
      - name: Run orchestration integration tests
        run: ./ci/compose/orchestration-integration.yml
      - name: Install CrewAI dependencies
        run: |
          pip install pytest requests jwt
      - name: Run CrewAI integration tests
        run: |
          pytest tests/integration/test_crewai_prod.py::test_crewai_roundtrip
  
  image-build:
    needs: orchestration-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and scan images
        run: |
          make build
          make scan-images
  
  template-lint:
    needs: orchestration-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate templates
        run: ./scripts/validate-health-templates.sh
  
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: [image-build, template-lint]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: ./scripts/deploy.sh staging
  
  deploy-prod:
    if: github.ref == 'refs/tags/v*' || github.event_name == 'workflow_dispatch'
    needs: orchestration-integration
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      
      - name: Mint CrewAI A2A token
        id: mint
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.CREWAI_A2A_PROVIDER }}
          service_account: ${{ secrets.CREWAI_A2A_CLIENT_ID }}
          create_credentials_file: true
          export_environment_variables: true
          token_lifetime: 900  # 15 minute token lifetime (in seconds)
      
      - name: Generate A2A token configuration
        run: |
          gcloud iam workload-identity-pools create-cred-config \
            $CREWAI_A2A_PROVIDER --service-account=$CREWAI_A2A_CLIENT_ID \
            --output-file=/tmp/crewai-token.json
      
      - uses: actions/upload-artifact@v4
        with:
          name: crewai-token
          path: /tmp/crewai-token.json
          retention-days: 1  # Only keep artifact for 1 day
      
      - name: Helm deploy
        env:
          CREWAI_ENDPOINT: ${{ secrets.CREWAI_ENDPOINT_PROD }}
          CREWAI_A2A_CLIENT_ID: ${{ secrets.CREWAI_A2A_CLIENT_ID }}
          CREWAI_A2A_TOKEN_PATH: /tmp/crewai-token.json
        run: ./scripts/deploy.sh
      
      # Delete the token artifact after deployment for security
      - name: Delete token artifact
        uses: geekyeggo/delete-artifact@v2
        with:
          name: crewai-token